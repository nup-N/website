services:
  auth:
    container_name: auth_service
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN}
    volumes:
      - auth_data:/app/data
    restart: unless-stopped

volumes:
  auth_data:
